name: Ping Render Backend
on:
  schedule:
    # Run every 10 minutes to prevent the Render free tier from sleeping
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Check
        run: curl -s https://foundit-backend-v2.onrender.com/health | grep healthy || exit 1
